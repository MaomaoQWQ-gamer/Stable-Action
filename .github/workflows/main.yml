name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "Stable Action.xcodeproj" \
            -scheme "Stable Action" \
            -archivePath ./build/StableAction.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Export IPA (Unsigned)
        run: |
          mkdir -p ./build/Payload
          cp -r ./build/StableAction.xcarchive/Products/Applications/*.app ./build/Payload/
          cd ./build
          zip -r StableAction.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # Đã sửa thành v4 ở đây
        with:
          name: StableAction-IPA
          path: ./build/StableAction.ipa
